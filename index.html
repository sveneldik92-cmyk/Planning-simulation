<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production-Planning Tool</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.11.1/dist/pptxgen.min.js" defer></script>
  <style>
    :root {
      --light-blue: #3a7bd5;
      --dark-blue: #174c8f;
      --bg: #f7f9fc;
      --text: #666;
      --border: #ccc;
    }
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .input-pane {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 24px;
    }
    .field {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .field label {
      flex: 1;
      font-weight: 600;
      color: var(--dark-blue);
    }
    .field input[type="number"],
    .field input[type="text"] {
      width: 120px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .field input[readonly] {
      background: #eef3fb;
    }
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    .slider-wrap input {
      flex: 1;
    }
    .boost-grid {
      display: grid;
      grid-template-columns: repeat(13, minmax(0, 1fr));
      gap: 6px;
      padding: 8px 0 0;
    }
    .boost-item {
      text-align: center;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .product-mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      width: 100%;
    }
    .product-mode-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #3b4a5a;
    }
    .product-mode-hint {
      font-size: 12px;
      color: #7a8794;
      margin-top: 4px;
    }
    .parallel-metrics {
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 10px 16px;
    }
    .parallel-metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: #3b4a5a;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
    }
    button {
      background: var(--light-blue);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary {
      background: var(--dark-blue);
    }
    .kpi {
      padding: 12px 16px;
      border-radius: 6px;
      font-weight: 700;
      color: #fff;
    }
    .kpi.ok {
      background: #2eaf5d;
    }
    .kpi.bad {
      background: #d94848;
    }
    .figures {
      background: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    th, td {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
    }
    th {
      color: var(--dark-blue);
    }
    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .gantt-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .gantt-controls {
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }
    .gantt-controls .boost-grid {
      padding: 0;
    }
    .scale-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .scale-controls button {
      padding: 8px 12px;
    }
    #gantt {
      width: 100%;
      height: 520px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .cycle-normal input {
      border-color: #3a7bd5;
      box-shadow: 0 0 0 1px rgba(58, 123, 213, 0.2);
    }
    .cycle-slow input {
      border-color: #d97a00;
      box-shadow: 0 0 0 1px rgba(217, 122, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="input-pane">
      <div class="field">
        <label for="normalStaff">Normal staffing / product</label>
        <input id="normalStaff" type="number" min="1" value="8" />
      </div>
      <div class="field cycle-normal">
        <label for="normalCT">Normal cycle-time (days)</label>
        <input id="normalCT" type="number" min="1" value="14" />
      </div>
      <div class="field">
        <label for="slowStaff">Slow staffing / product</label>
        <input id="slowStaff" type="number" min="1" value="6" />
      </div>
      <div class="field cycle-slow">
        <label for="slowCT">Slow cycle-time (days)</label>
        <input id="slowCT" type="number" min="1" value="18" readonly />
      </div>
      <div class="field">
        <label for="annualPD">Annual person-days budget</label>
        <input id="annualPD" type="number" min="1" value="9999" />
      </div>
      <div class="field">
        <label for="quarterDemand">Quarterly demand (# done)</label>
        <input id="quarterDemand" type="number" min="1" value="20" />
      </div>
      <div class="field" style="grid-column: span 2;">
        <label for="bunching">Bunching slider (0–100 %)</label>
        <div class="slider-wrap">
          <input id="bunching" type="range" min="0" max="100" value="30" />
          <span id="bunchingValue">30</span>
        </div>
      </div>
      <div class="field" style="grid-column: span 2; align-items: flex-start;">
        <label>Product speed selection</label>
        <div style="flex: 1;">
          <div id="productModeList" class="product-mode-grid"></div>
          <div class="product-mode-hint">Check the box to mark a product as slow (unchecked = fast).</div>
        </div>
      </div>
      <div class="actions" style="grid-column: span 2;">
        <button id="export" class="secondary">EXPORT → PPT</button>
      </div>
    </div>

    <div id="kpi" class="kpi ok">CAPACITY OK</div>

    <div class="figures">
      <strong>Derived figures</strong>
      <table>
        <tbody>
          <tr>
            <th>Slow cycle-time (days)</th>
            <td id="figSlowCT">-</td>
          </tr>
          <tr>
            <th>Daily head-count capacity (people)</th>
            <td id="figDailyCap">-</td>
          </tr>
          <tr>
            <th>Products completed this quarter</th>
            <td id="figCompleted">-</td>
          </tr>
          <tr>
            <th>Max products in parallel (day peak)</th>
            <td id="figPeak">-</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="charts">
      <div class="gantt-panel">
        <div class="gantt-controls">
          <div>
            <strong>Productivity boost weeks (W1…W13)</strong>
            <div class="boost-grid" id="boostGrid"></div>
          </div>
          <div class="scale-controls">
            <span><strong>Scale</strong></span>
            <button id="scaleIn">Scale in</button>
            <button id="scaleOut" class="secondary">Scale out</button>
          </div>
        </div>
        <div class="parallel-metrics" id="parallelMetrics"></div>
        <div id="gantt"></div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const byId = (id) => document.getElementById(id);
      const inputIds = ["normalStaff", "normalCT", "slowStaff", "annualPD", "quarterDemand"];
      const boostGrid = byId("boostGrid");
      const productModeList = byId("productModeList");
      const bunching = byId("bunching");
      const bunchingValue = byId("bunchingValue");
      const slowCT = byId("slowCT");
      const kpi = byId("kpi");
      const figSlowCT = byId("figSlowCT");
      const figDailyCap = byId("figDailyCap");
      const figCompleted = byId("figCompleted");
      const figPeak = byId("figPeak");
      const parallelMetrics = byId("parallelMetrics");
      let previousValues = {};
      let currentRangeDays = 91;
      let productModes = [];

      const clampInt = (value) => {
        const intVal = parseInt(value, 10);
        return Number.isFinite(intVal) && intVal > 0 ? intVal : null;
      };

      const buildBoostGrid = () => {
        for (let i = 1; i <= 13; i += 1) {
          const wrapper = document.createElement("label");
          wrapper.className = "boost-item";
          const caption = document.createElement("div");
          caption.textContent = `W${i}`;
          wrapper.appendChild(caption);
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = i;
          checkbox.dataset.week = i;
          wrapper.appendChild(checkbox);
          boostGrid.appendChild(wrapper);
        }
      };

      const getBoostWeeks = () => {
        const checks = Array.from(boostGrid.querySelectorAll("input[type='checkbox']"));
        return checks.filter((el) => el.checked).map((el) => parseInt(el.dataset.week, 10));
      };

      const enforceBoostLimit = (changed) => {
        const checked = getBoostWeeks();
        if (checked.length > 8) {
          changed.checked = false;
        }
      };

      const validateInputs = (changedId) => {
        const value = clampInt(byId(changedId).value);
        if (!value) {
          byId(changedId).value = previousValues[changedId];
          return false;
        }
        if (changedId === "slowStaff" || changedId === "normalStaff") {
          const normalStaff = clampInt(byId("normalStaff").value);
          const slowStaffVal = clampInt(byId("slowStaff").value);
          if (normalStaff && slowStaffVal && slowStaffVal >= normalStaff) {
            alert("Slow staffing must be less than normal staffing.");
            byId("slowStaff").value = previousValues["slowStaff"];
            return false;
          }
        }
        previousValues[changedId] = value;
        return true;
      };

      const buildProductModeList = (demand) => {
        const existingModes = getProductModes();
        productModeList.innerHTML = "";
        productModes = Array.from({ length: demand }, (_, i) => existingModes[i] || false);
        for (let i = 0; i < demand; i += 1) {
          const label = document.createElement("label");
          label.className = "product-mode-item";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.dataset.product = i;
          checkbox.checked = productModes[i];
          const text = document.createElement("span");
          text.textContent = `P${i + 1} slow`;
          label.appendChild(checkbox);
          label.appendChild(text);
          productModeList.appendChild(label);
        }
      };

      const getProductModes = () => {
        const checks = Array.from(productModeList.querySelectorAll("input[type='checkbox']"));
        const modes = [];
        checks.forEach((el) => {
          const idx = parseInt(el.dataset.product, 10);
          modes[idx] = el.checked;
        });
        return modes;
      };

      const updateSlowCT = () => {
        const normalCTVal = clampInt(byId("normalCT").value);
        const normalStaffVal = clampInt(byId("normalStaff").value);
        const slowStaffVal = clampInt(byId("slowStaff").value);
        if (!normalCTVal || !normalStaffVal || !slowStaffVal) {
          return;
        }
        const calculated = Math.max(1, Math.round((normalCTVal * normalStaffVal) / slowStaffVal));
        slowCT.value = calculated;
      };

      const computeSchedule = (inputs) => {
        const { demand, normalCT, slowCT, normalStaff, slowStaff, bunchingPct, boostWeeks, dailyCapacity, modes } = inputs;
        const startOffsets = [];
        const uniformInterval = Math.floor(91 / demand);
        const lateStart = Math.max(0, 91 - normalCT);
        for (let i = 0; i < demand; i += 1) {
          const uniform = i * uniformInterval;
          const mixed = Math.floor((1 - bunchingPct) * uniform + bunchingPct * lateStart);
          startOffsets.push(Math.max(0, mixed));
        }

        const activeProductsByDay = [];
        const activeStaffByDay = [];
        const productRuns = [];
        let maxEnd = 0;

        const isBoostedDay = (dayIndex) => {
          const week = Math.floor(dayIndex / 7) + 1;
          return boostWeeks.includes(week);
        };

        for (let i = 0; i < demand; i += 1) {
          const isSlow = modes[i] || false;
          const cycleTime = isSlow ? slowCT : normalCT;
          const staff = isSlow ? slowStaff : normalStaff;
          let work = 0;
          let day = startOffsets[i];
          const days = [];
          while (work < cycleTime && day < 365) {
            const boosted = isBoostedDay(day);
            work += boosted ? 1.125 : 1;
            days.push(day);
            day += 1;
          }
          const endDay = days[days.length - 1];
          maxEnd = Math.max(maxEnd, endDay);
          productRuns.push({
            name: `P${i + 1}`,
            start: startOffsets[i],
            end: endDay,
            isSlow,
          });
          days.forEach((d) => {
            activeProductsByDay[d] = (activeProductsByDay[d] || 0) + 1;
            activeStaffByDay[d] = (activeStaffByDay[d] || 0) + staff;
          });
        }

        const capacityByDay = [];
        for (let d = 0; d <= maxEnd; d += 1) {
          const boosted = isBoostedDay(d);
          capacityByDay[d] = boosted ? dailyCapacity * 1.125 : dailyCapacity;
        }

        return { productRuns, activeProductsByDay, activeStaffByDay, capacityByDay, maxEnd };
      };

      const getWeekNumber = (dayIndex) => Math.floor(dayIndex / 7) + 1;

      const renderGantt = async (runs, boostWeeks, rangeDays = 91) => {
        const baseDate = new Date(2024, 0, 1);
        const weekCount = Math.ceil(rangeDays / 7);
        const data = runs.map((run) => {
          const startDate = new Date(baseDate.getTime() + run.start * 86400000);
          const duration = (run.end - run.start + 1) * 86400000;
          const startWeek = getWeekNumber(run.start);
          const endWeek = getWeekNumber(run.end);
          return {
            type: "bar",
            orientation: "h",
            y: [run.name],
            x: [duration],
            base: [startDate],
            marker: { color: run.isSlow ? "#d97a00" : "#3a7bd5" },
            hovertemplate: `${run.name}<br>Start: W${startWeek}<br>End: W${endWeek}<extra></extra>`,
            name: run.name,
          };
        });

        const shapes = boostWeeks.map((week) => {
          const weekStart = new Date(baseDate.getTime() + (week - 1) * 7 * 86400000);
          const weekEnd = new Date(baseDate.getTime() + week * 7 * 86400000);
          return {
            type: "rect",
            xref: "x",
            yref: "paper",
            x0: weekStart,
            x1: weekEnd,
            y0: 0,
            y1: 1,
            fillcolor: "rgba(255,255,0,0.1)",
            line: { width: 0 },
          };
        });

        const layout = {
          barmode: "stack",
          margin: { l: 60, r: 20, t: 20, b: 40 },
          xaxis: {
            type: "date",
            range: [baseDate, new Date(baseDate.getTime() + rangeDays * 86400000)],
            tickvals: Array.from({ length: weekCount }, (_, i) => new Date(baseDate.getTime() + i * 7 * 86400000)),
            ticktext: Array.from({ length: weekCount }, (_, i) => `W${i + 1}`),
          },
          yaxis: { automargin: true },
          shapes,
          paper_bgcolor: "#fff",
          plot_bgcolor: "#fff",
          showlegend: false,
        };

        await Plotly.newPlot("gantt", data, layout, { displayModeBar: false });
      };

      const updateFigures = (inputs, schedule) => {
        figDailyCap.textContent = inputs.dailyCapacity.toFixed(2);
        const completed = schedule.productRuns.filter((run) => run.end <= 90).length;
        figCompleted.textContent = completed;
        const peak = Math.max(...schedule.activeProductsByDay.slice(0, 91).filter(Boolean), 0);
        figPeak.textContent = peak;
        figSlowCT.textContent = inputs.slowCT;
      };

      const updateKpi = (schedule, normalStaff) => {
        const maxDay = schedule.maxEnd || 0;
        let ok = true;
        for (let d = 0; d <= maxDay; d += 1) {
          const required = schedule.activeStaffByDay[d] || 0;
          if (required > schedule.capacityByDay[d]) {
            ok = false;
            break;
          }
        }
        kpi.textContent = ok ? "CAPACITY OK" : "OVERLOADED";
        kpi.className = `kpi ${ok ? "ok" : "bad"}`;
      };

      const updateParallelMetrics = (schedule, rangeDays = 91) => {
        const weeks = Math.ceil(rangeDays / 7);
        const metrics = [];
        for (let w = 0; w < weeks; w += 1) {
          const startDay = w * 7;
          const endDay = Math.min(rangeDays - 1, startDay + 6);
          let maxParallel = 0;
          for (let d = startDay; d <= endDay; d += 1) {
            const active = schedule.activeProductsByDay[d] || 0;
            if (active > maxParallel) {
              maxParallel = active;
            }
          }
          metrics.push({ week: w + 1, maxParallel });
        }
        const summary = metrics
          .map((item) => `<div><strong>W${item.week}</strong>: ${item.maxParallel}</div>`)
          .join("");
        parallelMetrics.innerHTML = `
          <div><strong>Max systems in parallel by week</strong></div>
          <div class="parallel-metrics-grid">${summary}</div>
        `;
      };

      const recalculate = async () => {
        const inputs = {};
        updateSlowCT();
        for (const id of inputIds) {
          if (!validateInputs(id)) {
            return;
          }
          inputs[id] = clampInt(byId(id).value);
        }
        const boostWeeks = getBoostWeeks();
        const modes = getProductModes();
        inputs.demand = inputs.quarterDemand;
        inputs.normalCT = inputs.normalCT;
        inputs.normalStaff = inputs.normalStaff;
        inputs.bunchingPct = parseInt(bunching.value, 10) / 100;
        inputs.dailyCapacity = inputs.annualPD / 260;
        inputs.boostWeeks = boostWeeks;
        inputs.slowCT = clampInt(slowCT.value);
        inputs.slowStaff = inputs.slowStaff;

        const schedule = computeSchedule({
          demand: inputs.demand,
          normalCT: inputs.normalCT,
          slowCT: inputs.slowCT,
          normalStaff: inputs.normalStaff,
          slowStaff: inputs.slowStaff,
          bunchingPct: inputs.bunchingPct,
          boostWeeks,
          dailyCapacity: inputs.dailyCapacity,
          modes,
        });

        updateFigures(inputs, schedule);
        updateKpi(schedule, inputs.normalStaff);
        updateParallelMetrics(schedule, currentRangeDays);
        await renderGantt(schedule.productRuns, boostWeeks, currentRangeDays);
      };

      const exportPpt = async () => {
        const imageData = await Plotly.toImage("gantt", { format: "png", width: 1200, height: 520 });
        const pptx = new PptxGenJS();
        pptx.layout = "LAYOUT_WIDE";
        const slide1 = pptx.addSlide();
        slide1.addImage({ data: imageData, x: 0, y: 0, w: 13.33, h: 7.5 });

        const slide2 = pptx.addSlide();
        const params = [
          `Normal staffing / product: ${byId("normalStaff").value}`,
          `Normal cycle-time (days): ${byId("normalCT").value}`,
          `Slow staffing / product: ${byId("slowStaff").value}`,
          `Slow cycle-time (days): ${slowCT.value}`,
          `Annual person-days budget: ${byId("annualPD").value}`,
          `Quarterly demand: ${byId("quarterDemand").value}`,
          `Bunching (%): ${bunching.value}`,
          `Boost weeks: ${getBoostWeeks().join(", ") || "None"}`,
          `KPI: ${kpi.textContent}`,
          `Daily head-count capacity: ${figDailyCap.textContent}`,
          `Products completed this quarter: ${figCompleted.textContent}`,
          `Max products in parallel: ${figPeak.textContent}`,
        ];
        slide2.addText(params.join("\n"), {
          x: 0.5,
          y: 0.5,
          w: 12.3,
          h: 6.5,
          fontSize: 18,
          color: "174c8f",
        });
        pptx.writeFile({ fileName: "PlanningReport.pptx" });
      };

      document.addEventListener("DOMContentLoaded", () => {
        buildBoostGrid();
        buildProductModeList(clampInt(byId("quarterDemand").value) || 0);
        inputIds.forEach((id) => {
          const el = byId(id);
          previousValues[id] = clampInt(el.value) || 1;
          el.addEventListener("change", () => {
            if (validateInputs(id)) {
              if (id === "quarterDemand") {
                buildProductModeList(clampInt(byId("quarterDemand").value) || 0);
              }
              recalculate();
            }
          });
        });
        bunching.addEventListener("input", () => {
          bunchingValue.textContent = bunching.value;
          recalculate();
        });
        productModeList.addEventListener("change", (event) => {
          if (event.target.matches("input[type='checkbox']")) {
            recalculate();
          }
        });
        boostGrid.addEventListener("change", (event) => {
          if (event.target.matches("input[type='checkbox']")) {
            enforceBoostLimit(event.target);
            recalculate();
          }
        });
        byId("scaleIn").addEventListener("click", () => {
          currentRangeDays = Math.max(28, currentRangeDays - 14);
          recalculate();
        });
        byId("scaleOut").addEventListener("click", () => {
          currentRangeDays = Math.min(140, currentRangeDays + 14);
          recalculate();
        });
        byId("export").addEventListener("click", () => {
          exportPpt();
        });
        recalculate();
      });
    })();
  </script>
</body>
</html>
