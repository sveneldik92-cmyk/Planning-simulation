<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production-Planning Tool</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.11.1/dist/pptxgen.min.js" defer></script>
  <style>
    :root {
      --light-blue: #3a7bd5;
      --dark-blue: #174c8f;
      --bg: #f7f9fc;
      --text: #666;
      --border: #ccc;
    }
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .input-pane {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 24px;
    }
    .field {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .field label {
      flex: 1;
      font-weight: 600;
      color: var(--dark-blue);
    }
    .field input[type="number"],
    .field input[type="text"] {
      width: 120px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .field input[readonly] {
      background: #eef3fb;
    }
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    .slider-wrap input {
      flex: 1;
    }
    .boost-grid {
      display: grid;
      grid-template-columns: repeat(var(--week-columns, 13), minmax(0, 1fr));
      gap: 6px;
      padding: 8px 0 0;
    }
    .boost-item {
      text-align: center;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .product-mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      width: 100%;
    }
    .product-mode-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #3b4a5a;
    }
    .product-mode-hint {
      font-size: 12px;
      color: #7a8794;
      margin-top: 4px;
    }
    .parallel-metrics {
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 10px 16px;
    }
    .parallel-metrics-grid {
      display: grid;
      grid-template-columns: repeat(var(--week-columns, 13), minmax(60px, 1fr));
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: #3b4a5a;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
    }
    button {
      background: var(--light-blue);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary {
      background: var(--dark-blue);
    }
    .kpi {
      padding: 12px 16px;
      border-radius: 6px;
      font-weight: 700;
      color: #fff;
    }
    .kpi.ok {
      background: #2eaf5d;
    }
    .kpi.bad {
      background: #d94848;
    }
    .figures {
      background: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    th, td {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
    }
    th {
      color: var(--dark-blue);
    }
    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .gantt-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .weekly-options {
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 10px 16px;
    }
    .weekly-options h4 {
      margin: 0 0 6px;
      color: var(--dark-blue);
    }
    .gantt-controls {
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }
    .gantt-controls .boost-grid {
      padding: 0;
    }
    .scale-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .scale-controls button {
      padding: 8px 12px;
    }
    #gantt {
      width: 100%;
      height: 520px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .cycle-normal input {
      border-color: #3a7bd5;
      box-shadow: 0 0 0 1px rgba(58, 123, 213, 0.2);
    }
    .cycle-slow input {
      border-color: #d97a00;
      box-shadow: 0 0 0 1px rgba(217, 122, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="input-pane">
      <div class="field">
        <label for="normalStaff">Normal staffing / product</label>
        <input id="normalStaff" type="number" min="1" value="8" />
      </div>
      <div class="field cycle-normal">
        <label for="normalCT">Normal cycle-time (days)</label>
        <input id="normalCT" type="number" min="1" step="0.1" value="14.0" />
      </div>
      <div class="field">
        <label for="slowStaff">Slow staffing / product</label>
        <input id="slowStaff" type="number" min="1" value="6" />
      </div>
      <div class="field cycle-slow">
        <label for="slowCT">Slow cycle-time (days)</label>
        <input id="slowCT" type="number" min="1" value="18" readonly />
      </div>
      <div class="field">
        <label for="fteFactor">Max staffing → FTE factor</label>
        <input id="fteFactor" type="number" min="0.1" step="0.1" value="0.2" />
      </div>
      <div class="field">
        <label for="quarterDemand">Quarterly demand (# done)</label>
        <input id="quarterDemand" type="number" min="1" value="20" />
      </div>
      <div class="field" style="grid-column: span 2;">
        <label for="bunching">Bunching slider (0–100 %)</label>
        <div class="slider-wrap">
          <input id="bunching" type="range" min="0" max="100" value="30" />
          <span id="bunchingValue">30</span>
        </div>
      </div>
      <div class="actions" style="grid-column: span 2;">
        <button id="export" class="secondary">EXPORT → PPT</button>
      </div>
    </div>

    <div id="kpi" class="kpi ok">DEMAND MET</div>

    <div class="figures">
      <strong>Derived figures</strong>
      <table>
        <tbody>
          <tr>
            <th>Slow cycle-time (days)</th>
            <td id="figSlowCT">-</td>
          </tr>
          <tr>
            <th>Max staffing needed (weekly peak)</th>
            <td id="figMaxStaff">-</td>
          </tr>
          <tr>
            <th>Products completed this quarter</th>
            <td id="figCompleted">-</td>
          </tr>
          <tr>
            <th>Max staffing (FTE)</th>
            <td id="figMaxStaffFte">-</td>
          </tr>
          <tr>
            <th>Max products in parallel (day peak)</th>
            <td id="figPeak">-</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="charts">
      <div class="gantt-panel">
        <div class="gantt-controls">
          <div class="scale-controls">
            <span><strong>Scale</strong></span>
            <button id="scaleIn">Scale in</button>
            <button id="scaleOut" class="secondary">Scale out</button>
          </div>
        </div>
        <div class="parallel-metrics" id="parallelMetrics"></div>
        <div id="gantt"></div>
        <div class="weekly-options">
          <h4>Weekly options</h4>
          <div class="boost-grid" id="boostGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const byId = (id) => document.getElementById(id);
      const inputIds = ["normalStaff", "normalCT", "slowStaff", "fteFactor", "quarterDemand"];
      const boostGrid = byId("boostGrid");
      const bunching = byId("bunching");
      const bunchingValue = byId("bunchingValue");
      const slowCT = byId("slowCT");
      const kpi = byId("kpi");
      const figSlowCT = byId("figSlowCT");
      const figMaxStaff = byId("figMaxStaff");
      const figMaxStaffFte = byId("figMaxStaffFte");
      const figCompleted = byId("figCompleted");
      const figPeak = byId("figPeak");
      const parallelMetrics = byId("parallelMetrics");
      let previousValues = {};
      let currentRangeDays = 91;
      let productModes = [];

      const clampNumber = (value, allowFloat = false) => {
        const numVal = allowFloat ? parseFloat(value) : parseInt(value, 10);
        return Number.isFinite(numVal) && numVal > 0 ? numVal : null;
      };

      const buildBoostGrid = (weeks, selectedWeeks = []) => {
        boostGrid.innerHTML = "";
        boostGrid.style.setProperty("--week-columns", weeks);
        for (let i = 1; i <= weeks; i += 1) {
          const wrapper = document.createElement("label");
          wrapper.className = "boost-item";
          const caption = document.createElement("div");
          caption.textContent = `W${i}`;
          wrapper.appendChild(caption);
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = i;
          checkbox.dataset.week = i;
          checkbox.checked = selectedWeeks.includes(i);
          wrapper.appendChild(checkbox);
          boostGrid.appendChild(wrapper);
        }
      };

      const getBoostWeeks = () => {
        const checks = Array.from(boostGrid.querySelectorAll("input[type='checkbox']"));
        return checks.filter((el) => el.checked).map((el) => parseInt(el.dataset.week, 10));
      };

      const enforceBoostLimit = (changed) => {
        const checked = getBoostWeeks();
        if (checked.length > 8) {
          changed.checked = false;
        }
      };

      const validateInputs = (changedId) => {
        const allowFloat = changedId === "normalCT" || changedId === "fteFactor";
        const value = clampNumber(byId(changedId).value, allowFloat);
        if (!value) {
          byId(changedId).value = previousValues[changedId];
          return false;
        }
        if (changedId === "normalCT") {
          byId(changedId).value = value.toFixed(1);
        }
        if (changedId === "slowStaff" || changedId === "normalStaff") {
          const normalStaff = clampNumber(byId("normalStaff").value);
          const slowStaffVal = clampNumber(byId("slowStaff").value);
          if (normalStaff && slowStaffVal && slowStaffVal >= normalStaff) {
            alert("Slow staffing must be less than normal staffing.");
            byId("slowStaff").value = previousValues["slowStaff"];
            return false;
          }
        }
        previousValues[changedId] = value;
        return true;
      };

      const buildProductModeList = (demand) => {
        productModes = Array.from({ length: demand }, (_, i) => productModes[i] || false);
      };

      const updateSlowCT = () => {
        const normalCTVal = clampNumber(byId("normalCT").value, true);
        const normalStaffVal = clampNumber(byId("normalStaff").value);
        const slowStaffVal = clampNumber(byId("slowStaff").value);
        if (!normalCTVal || !normalStaffVal || !slowStaffVal) {
          return;
        }
        const calculated = Math.max(1, Math.round((normalCTVal * normalStaffVal) / slowStaffVal));
        slowCT.value = calculated;
      };

      const computeSchedule = (inputs) => {
        const { demand, normalCT, slowCT, normalStaff, slowStaff, bunchingPct, boostWeeks, modes } = inputs;
        const startOffsets = [];
        const uniformInterval = Math.floor(91 / demand);
        const lateStart = Math.max(0, 91 - normalCT);
        for (let i = 0; i < demand; i += 1) {
          const uniform = i * uniformInterval;
          const mixed = Math.floor((1 - bunchingPct) * uniform + bunchingPct * lateStart);
          startOffsets.push(Math.max(0, mixed));
        }
        if (startOffsets.length > 0) {
          startOffsets[0] = 0;
        }

        const activeProductsByDay = [];
        const activeStaffByDay = [];
        const productRuns = [];
        let maxEnd = 0;

        const isBoostedDay = (dayIndex) => {
          const week = Math.floor(dayIndex / 7) + 1;
          return boostWeeks.includes(week);
        };

        for (let i = 0; i < demand; i += 1) {
          const isSlow = modes[i] || false;
          const cycleTime = isSlow ? slowCT : normalCT;
          const staff = isSlow ? slowStaff : normalStaff;
          let work = 0;
          let day = startOffsets[i];
          const days = [];
          while (work < cycleTime && day < 365) {
            const boosted = isBoostedDay(day);
            work += boosted ? 1.125 : 1;
            days.push(day);
            day += 1;
          }
          const endDay = days[days.length - 1];
          maxEnd = Math.max(maxEnd, endDay);
          productRuns.push({
            name: `P${i + 1}`,
            index: i,
            start: startOffsets[i],
            end: endDay,
            isSlow,
          });
          days.forEach((d) => {
            activeProductsByDay[d] = (activeProductsByDay[d] || 0) + 1;
            activeStaffByDay[d] = (activeStaffByDay[d] || 0) + staff;
          });
        }

        const weeklyMaxStaff = [];
        for (let w = 0; w <= Math.floor(maxEnd / 7); w += 1) {
          const startDay = w * 7;
          const endDay = Math.min(maxEnd, startDay + 6);
          let weekPeak = 0;
          for (let d = startDay; d <= endDay; d += 1) {
            weekPeak = Math.max(weekPeak, activeStaffByDay[d] || 0);
          }
          weeklyMaxStaff[w] = weekPeak;
        }

        return { productRuns, activeProductsByDay, activeStaffByDay, weeklyMaxStaff, maxEnd };
      };

      const getWeekNumber = (dayIndex) => Math.floor(dayIndex / 7) + 1;

      const renderGantt = async (runs, boostWeeks, rangeDays = 91) => {
        const baseDate = new Date(2024, 0, 1);
        const weekCount = Math.ceil(rangeDays / 7);
        const data = runs.map((run) => {
          const startDate = new Date(baseDate.getTime() + run.start * 86400000);
          const duration = (run.end - run.start + 1) * 86400000;
          const startWeek = getWeekNumber(run.start);
          const endWeek = getWeekNumber(run.end);
          return {
            type: "bar",
            orientation: "h",
            y: ["Systems"],
            x: [duration],
            base: [startDate],
            marker: {
              color: run.isSlow ? "#d97a00" : "#3a7bd5",
              line: { color: "#fff", width: 2 },
            },
            hovertemplate: `${run.name}<br>Start: W${startWeek}<br>End: W${endWeek}<extra></extra>`,
            name: run.name,
            customdata: [run.index],
          };
        });

        const shapes = boostWeeks.map((week) => {
          const weekStart = new Date(baseDate.getTime() + (week - 1) * 7 * 86400000);
          const weekEnd = new Date(baseDate.getTime() + week * 7 * 86400000);
          return {
            type: "rect",
            xref: "x",
            yref: "paper",
            x0: weekStart,
            x1: weekEnd,
            y0: 0,
            y1: 1,
            fillcolor: "rgba(255,255,0,0.1)",
            line: { width: 0 },
          };
        });

        const layout = {
          barmode: "stack",
          margin: { l: 60, r: 20, t: 20, b: 40 },
          xaxis: {
            type: "date",
            range: [baseDate, new Date(baseDate.getTime() + rangeDays * 86400000)],
            tickvals: Array.from({ length: weekCount }, (_, i) => new Date(baseDate.getTime() + i * 7 * 86400000)),
            ticktext: Array.from({ length: weekCount }, (_, i) => `W${i + 1}`),
          },
          yaxis: { automargin: true },
          shapes,
          paper_bgcolor: "#fff",
          plot_bgcolor: "#fff",
          showlegend: false,
        };

        await Plotly.newPlot("gantt", data, layout, { displayModeBar: false });
        const ganttEl = byId("gantt");
        if (ganttEl.removeAllListeners) {
          ganttEl.removeAllListeners("plotly_click");
        }
        ganttEl.on("plotly_click", (eventData) => {
          const point = eventData.points[0];
          const idx = point.customdata;
          productModes[idx] = !productModes[idx];
          recalculate();
        });
      };

      const updateFigures = (inputs, schedule) => {
        const completed = schedule.productRuns.filter((run) => run.end <= 90).length;
        figCompleted.textContent = completed;
        const peak = Math.max(...schedule.activeProductsByDay.slice(0, 91).filter(Boolean), 0);
        figPeak.textContent = peak;
        figSlowCT.textContent = inputs.slowCT;
        figMaxStaff.textContent = schedule.maxWeeklyStaff;
        figMaxStaffFte.textContent = (schedule.maxWeeklyStaff * inputs.fteFactor).toFixed(1);
      };

      const updateKpi = (schedule, demand) => {
        const completed = schedule.productRuns.filter((run) => run.end <= 90).length;
        const ok = completed >= demand;
        kpi.textContent = ok ? "DEMAND MET" : "DEMAND SHORTFALL";
        kpi.className = `kpi ${ok ? "ok" : "bad"}`;
      };

      const updateParallelMetrics = (schedule, rangeDays = 91) => {
        const weeks = Math.ceil(rangeDays / 7);
        const metrics = [];
        const staffing = [];
        for (let w = 0; w < weeks; w += 1) {
          const startDay = w * 7;
          const endDay = Math.min(rangeDays - 1, startDay + 6);
          let maxParallel = 0;
          let maxStaff = 0;
          for (let d = startDay; d <= endDay; d += 1) {
            const active = schedule.activeProductsByDay[d] || 0;
            const staff = schedule.activeStaffByDay[d] || 0;
            if (active > maxParallel) {
              maxParallel = active;
            }
            if (staff > maxStaff) {
              maxStaff = staff;
            }
          }
          metrics.push({ week: w + 1, maxParallel });
          staffing.push({ week: w + 1, maxStaff });
        }
        parallelMetrics.style.setProperty("--week-columns", weeks);
        const summary = metrics.map((item) => `<div><strong>W${item.week}</strong><br>${item.maxParallel}</div>`).join("");
        const staffingSummary = staffing
          .map((item) => `<div><strong>W${item.week}</strong><br>${item.maxStaff}</div>`)
          .join("");
        parallelMetrics.innerHTML = `
          <div><strong>Max systems in parallel by week</strong></div>
          <div class="parallel-metrics-grid">${summary}</div>
          <div style="margin-top: 10px;"><strong>Max staffing needed by week</strong></div>
          <div class="parallel-metrics-grid">${staffingSummary}</div>
        `;
      };

      const recalculate = async () => {
        const inputs = {};
        updateSlowCT();
        for (const id of inputIds) {
          if (!validateInputs(id)) {
            return;
          }
          const allowFloat = id === "normalCT" || id === "fteFactor";
          inputs[id] = clampNumber(byId(id).value, allowFloat);
        }
        const boostWeeks = getBoostWeeks();
        const modes = productModes;
        inputs.demand = inputs.quarterDemand;
        inputs.normalCT = inputs.normalCT;
        inputs.normalStaff = inputs.normalStaff;
        inputs.bunchingPct = parseInt(bunching.value, 10) / 100;
        inputs.boostWeeks = boostWeeks;
        inputs.slowCT = clampNumber(slowCT.value);
        inputs.slowStaff = inputs.slowStaff;

        const schedule = computeSchedule({
          demand: inputs.demand,
          normalCT: inputs.normalCT,
          slowCT: inputs.slowCT,
          normalStaff: inputs.normalStaff,
          slowStaff: inputs.slowStaff,
          bunchingPct: inputs.bunchingPct,
          boostWeeks,
          modes,
        });
        schedule.maxWeeklyStaff = schedule.weeklyMaxStaff.length
          ? Math.max(...schedule.weeklyMaxStaff)
          : 0;

        updateFigures(inputs, schedule);
        updateKpi(schedule, inputs.demand);
        updateParallelMetrics(schedule, currentRangeDays);
        await renderGantt(schedule.productRuns, boostWeeks, currentRangeDays);
      };

      const exportPpt = async () => {
        const imageData = await Plotly.toImage("gantt", { format: "png", width: 1200, height: 520 });
        const pptx = new PptxGenJS();
        pptx.layout = "LAYOUT_WIDE";
        const slide1 = pptx.addSlide();
        slide1.addImage({ data: imageData, x: 0, y: 0, w: 13.33, h: 7.5 });

        const slide2 = pptx.addSlide();
        const params = [
          `Normal staffing / product: ${byId("normalStaff").value}`,
          `Normal cycle-time (days): ${byId("normalCT").value}`,
          `Slow staffing / product: ${byId("slowStaff").value}`,
          `Slow cycle-time (days): ${slowCT.value}`,
          `Max staffing → FTE factor: ${byId("fteFactor").value}`,
          `Quarterly demand: ${byId("quarterDemand").value}`,
          `Bunching (%): ${bunching.value}`,
          `Boost weeks: ${getBoostWeeks().join(", ") || "None"}`,
          `KPI: ${kpi.textContent}`,
          `Max staffing needed (weekly peak): ${figMaxStaff.textContent}`,
          `Max staffing (FTE): ${figMaxStaffFte.textContent}`,
          `Products completed this quarter: ${figCompleted.textContent}`,
          `Max products in parallel: ${figPeak.textContent}`,
        ];
        slide2.addText(params.join("\n"), {
          x: 0.5,
          y: 0.5,
          w: 12.3,
          h: 6.5,
          fontSize: 18,
          color: "174c8f",
        });
        pptx.writeFile({ fileName: "PlanningReport.pptx" });
      };

      document.addEventListener("DOMContentLoaded", () => {
        buildBoostGrid(Math.ceil(currentRangeDays / 7));
        buildProductModeList(clampNumber(byId("quarterDemand").value) || 0);
        inputIds.forEach((id) => {
          const el = byId(id);
          const allowFloat = id === "normalCT" || id === "fteFactor";
          previousValues[id] = clampNumber(el.value, allowFloat) || 1;
          el.addEventListener("change", () => {
            if (validateInputs(id)) {
              if (id === "quarterDemand") {
                buildProductModeList(clampNumber(byId("quarterDemand").value) || 0);
              }
              recalculate();
            }
          });
        });
        bunching.addEventListener("input", () => {
          bunchingValue.textContent = bunching.value;
          recalculate();
        });
        boostGrid.addEventListener("change", (event) => {
          if (event.target.matches("input[type='checkbox']")) {
            enforceBoostLimit(event.target);
            recalculate();
          }
        });
        byId("scaleIn").addEventListener("click", () => {
          currentRangeDays = Math.max(28, currentRangeDays - 14);
          const selected = getBoostWeeks();
          buildBoostGrid(Math.ceil(currentRangeDays / 7), selected);
          recalculate();
        });
        byId("scaleOut").addEventListener("click", () => {
          currentRangeDays = Math.min(140, currentRangeDays + 14);
          const selected = getBoostWeeks();
          buildBoostGrid(Math.ceil(currentRangeDays / 7), selected);
          recalculate();
        });
        byId("export").addEventListener("click", () => {
          exportPpt();
        });
        recalculate();
      });
    })();
  </script>
</body>
</html>
